# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for the agent-of-empires GitHub plugin.
# Reference: https://docs.coderabbit.ai/reference/yaml-template
# Schema:    https://coderabbit.ai/integrations/schema.v2.json
#
# Philosophy mirrors the AoE core repo: start small, comment-only, pre-merge
# gates at `warning` until real PR traffic justifies `error`. Linters that CI
# already runs (ruff, mypy) are left to CI to avoid duplicate signal.

language: en-US

tone_instructions: "Review code like a calm, friendly senior engineer. Be clear, constructive, and encouraging. Explain the reasoning behind suggestions, assume good intentions, and occasionally use light, friendly humor when appropriate."

early_access: false
enable_free_tier: true

reviews:
  profile: chill

  request_changes_workflow: false

  high_level_summary: true
  high_level_summary_instructions: "Provide a concise, high-level summary of the code changes, focusing on the most significant improvements and potential areas for further enhancement. Use clear and concise language, and avoid overly technical jargon. We just want to know what changed, what moved, what was added, what was removed. Not technically. Then you can add technical jargons in another block if needed. Provide the benefits of the PR if you can"
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false

  auto_title_placeholder: "@coderabbitai title"
  auto_title_instructions: "Generate a short, action-oriented PR title. Start with a verb in the imperative form. Focus only on what changed, not why. Keep it concise and specific"

  review_status: true
  commit_status: false
  fail_commit_status: false

  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true

  suggested_labels: true
  labeling_instructions: []
  auto_apply_labels: false

  suggested_reviewers: true
  auto_assign_reviewers: true

  in_progress_fortune: false
  poem: false

  enable_prompt_for_ai_agents: true

  path_filters: []
  path_instructions: []

  abort_on_close: true
  disable_cache: false

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - "Dependencies"
      - "update dependency"
      - "wip"
      - "dependabot"
    labels: []
    drafts: false
    base_branches: ["main"]
    ignore_usernames: []

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    simplify:
      enabled: true

  pre_merge_checks:
    docstrings:
      mode: warning
      threshold: 80
    issue_assessment:
      mode: warning
    title:
      mode: warning
      requirements: |
        PR titles should start with a Conventional Commit prefix: `feat:`, `fix:`, `docs:`, `refactor:`, `chore:`, `test:`, `perf:`, `ci:`, `build:`, `style:`, `security:`, or `revert:`.
        Use imperative mood, lowercase subject. Keep the title under ~70 chars and let the body carry the detail.
    description:
      mode: warning

  tools:
    # CI already runs ruff + mypy; leave them off here to avoid duplicate signal.
    ruff:
      enabled: false
    # Things CI does not cover and that are cheap to surface inline.
    gitleaks:
      enabled: true
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    # We ship several GitHub Actions workflows and nothing else lints them.
    actionlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    shellcheck:
      enabled: false
    languagetool:
      enabled: false
    checkov:
      enabled: false
    semgrep:
      enabled: false
    dotenvLint:
      enabled: false

chat:
  art: true
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/README.md"
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  mcp:
    usage: enabled

code_generation:
  docstrings:
    language: en-US

issue_enrichment:
  auto_enrich:
    enabled: false
  planning:
    enabled: false
    auto_planning:
      enabled: false
      labels: []
