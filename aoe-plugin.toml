# Agent of Empires GitHub plugin.
#
# A valid, installable, discoverable plugin that wires up the common
# contribution kinds (commands, a setting, a UI slot, and a Tier 1 worker).
# The worker is real: it answers github.status / github.refresh / github.open
# with live GitHub API calls (see worker code under src/aoe_github_plugin/).
#
# Schema: aoe-plugin-api/src/manifest.rs in agent-of-empires (landed in #2093).
# The host parses this strictly (deny_unknown_fields), so every key below must
# match a field in that schema.

id = "agent-of-empires.github"
name = "GitHub"
version = "1.5.0"
# Manifest schema / host API version. api_version 5 added the [[screenshots]]
# list (declared below); 6 lets a command declare a client-executed `action`
# (the `open_pr` command below uses `open-ui-link`). A host older than 6 rejects
# this manifest with "api_version 6 is not supported" rather than loading a
# command it cannot run.
api_version = 6
# Host-app compatibility range (different axis from api_version, which is the
# manifest-schema version). The host refuses install/update outside this range
# and skips loading if a later aoe upgrade moves out of it. Requires api_version
# >= 4. Current released aoe is 1.11.3; refuse an untested 2.0.
aoe_version = ">=1.11.0, <2.0.0"
description = "GitHub integration for Agent of Empires: surface PR and issue state for your sessions."

# Capability grants are prompted at install and pinned to the manifest hash.
# Declare only what the worker actually uses so the prompt stays honest.
#   net           - real GitHub API calls (api.github.com); also shells out to
#                   `git` and `gh`.
#   runtime.worker - host RPCs the worker initiates: it pushes PR state to the
#                   rendered UI slots via `ui.state.set` (#2366) and reads its
#                   own `ui_refresh_secs` setting via `config.get` (#2399, gated
#                   on runtime.worker, not config.read). D9 is unmerged, so the
#                   exact gating capability for the ui.state.* RPCs is not
#                   published; runtime.worker is the closest mapping (events.*
#                   and config.get use it). Re-pin on rebase if D9 names a
#                   dedicated capability.
#   notifications - the worker raises in-app notices via the `ui.notify` host
#                   RPC: on a user-initiated refresh that is rate-limited it
#                   warns the user, with the reset countdown (#20).
# All are in aoe_plugin_api::KNOWN_CAPABILITIES. Add later as the surface grows:
#   session.read  to correlate PRs/issues with active sessions
#   browser_open  - the `open_pr` command opens the active session's PR href
#                   (already published into the row-badge slot) in the user's
#                   browser; the host gates a command's browser-opening action
#                   on this grant.
capabilities = ["net", "runtime.worker", "session.read", "notifications", "browser_open"]

# Marketplace screenshots, rendered in the plugin detail modal above the
# description (api_version 5, schema: Screenshot in aoe-plugin-api/src/manifest.rs).
# Each `path` is repository-relative; the detail endpoint resolves it to a
# raw.githubusercontent.com URL against the installed ref (else HEAD), so the
# assets must live in this repo. `alt` is required (content, not decoration).
[[screenshots]]
path = "assets/screenshots/session-rows.png"
alt = "Two session rows, each showing a colored PR icon for an attached open pull request."
caption = "Open-PR badges on session rows."

[[screenshots]]
path = "assets/screenshots/ci.png"
alt = "The GitHub pane showing CI check results for a session's pull request."
caption = "CI results in the GitHub pane."

[[screenshots]]
path = "assets/screenshots/comments.png"
alt = "The GitHub pane showing a CodeRabbit review with unresolved comments on a pull request."
caption = "Review comments in the GitHub pane."

# Commands the plugin contributes (palette / CLI), namespaced by the host as
# plugin.agent-of-empires.github.<id>. The command-id -> worker RPC mapping
# (status -> github.status, etc.) is host convention (#2094), not declared here.
[[commands]]
id = "status"
title = "GitHub: status"
description = "Show the GitHub status summary for this checkout."

[[commands]]
id = "refresh"
title = "GitHub: refresh"
description = "Re-fetch the GitHub status for this checkout."

[[commands]]
id = "open"
title = "GitHub: open"
description = "Open this checkout's PR (or the create-PR page) in a browser."

# A client-executed command (api_version 6): invoking it opens the active
# session's PR directly from the row-badge slot's `href`, which the worker
# already publishes per session. No worker round-trip, so it works from the web
# command palette (cmd+k) without a popup-blocked async open, and from a keybind.
# Gated on the `browser_open` capability.
[[commands]]
id = "open_pr"
title = "GitHub: open PR"
description = "Open the active session's pull request in your browser."
[commands.action]
kind = "open-ui-link"
slot = "row-badge"
id = "github_pr_badge"

# Default chord for `open_pr`, surfaced in both palettes and bound on both
# surfaces. Ctrl+Shift+G stays clear of the core bindings (core always wins a
# collision) and parses on the TUI (which accepts only Ctrl/Shift chords).
[[keybinds]]
command = "open_pr"
key = "Ctrl+Shift+G"

# Settings, rendered generically on the TUI and web settings surfaces and
# stored under [plugins."agent-of-empires.github".settings]. The worker reads
# them back at runtime via the `config.get` host RPC (#2399).
[[settings]]
key = "ui_refresh_secs"
label = "GitHub UI refresh interval (seconds)"
description = "How often the worker checks GitHub for PR/CI/review changes (network tick). A cheap conditional check runs each tick; the costly query fires only on a change. 0 disables the background poll (it still pushes on startup and on refresh)."
type = "integer"
default = 120
min = 0
max = 86400
advanced = true

# Session-row chip toggles (#36). Each defaults on; turning one off hides that
# chip from every session row (and drops it from the row's status summary), while
# the GitHub pane still shows the full detail.
[[settings]]
key = "show_review_status"
label = "Show review status in session row"
description = "Show the PR review-state chip (approved / changes requested / awaiting review) on each session row. The GitHub pane still shows review state when this is off."
type = "boolean"
default = true

[[settings]]
key = "show_ci_status"
label = "Show CI status in session row"
description = "Show the CI check chip (passing / failing / running) on each session row. The GitHub pane still shows checks when this is off."
type = "boolean"
default = true

[[settings]]
key = "ci_required_checks_only"
label = "Gate CI status on required checks"
description = "When enabled, the session row treats only required status checks as the CI rollup. Optional failing checks remain visible in the GitHub pane."
type = "boolean"
default = false
advanced = true

[[settings]]
key = "show_comment_status"
label = "Show unresolved-comment status in session row"
description = "Show the unresolved-review-comment chip on each session row. The GitHub pane still lists the comments when this is off."
type = "boolean"
default = true

[[settings]]
key = "show_status_text"
label = "Show PR status summary text in session row"
description = "Show the words summary at the end of each session row (e.g. \"CI failing\", \"approved\"). Turn off to keep only the PR status icons. The GitHub pane is unaffected."
type = "boolean"
default = true

[[settings]]
key = "ignore_submodules"
label = "Ignore Git submodules"
description = "Skip Git submodule checkouts discovered under a session workspace. The workspace root itself is still scanned even if it is a submodule."
type = "boolean"
default = true
advanced = true

# UI extension points. The host renders each slot; the worker pushes display
# state through the `ui.state.set` host RPC (wired by #2366). Per-session
# surfaces include a `row-badge` that shows colored PR icons, a `row-column`
# status cell, and a `pane` GitHub tool-window. The global `sort-key` lets the
# dashboard sort sessions by the same GitHub PR attention rank the row shows.
# Slot must be one of the host's known UiSlot variants.
[[ui]]
slot = "row-badge"
id = "github_pr_badge"

[[ui]]
slot = "pane"
id = "github_pane"

# A per-session text cell on the session row: one deterministic words summary of
# the session's most-urgent PR signal (changes requested / CI failing /
# unresolved comments / awaiting review / healthy), so the list is scannable
# without hovering the badge or opening the pane (#36). The badge carries the
# per-repo icon; this carries the words. Driven by one push per session; an empty
# payload clears it.
[[ui]]
slot = "row-column"
id = "github_pr_status"

[[ui]]
slot = "sort-key"
id = "github_pr_attention"

# Tier 1 worker: the executable the host spawns and supervises, speaking
# ndjson JSON-RPC over stdio. The host requires the entrypoint to be
# plugin-relative so the daemon's PATH never decides whether the worker
# launches (#2406): the build steps create a venv and install this package
# into it (defining the `aoe-github-worker` console script from
# pyproject.toml [project.scripts]), then `command` launches it.
# Build steps run in the user's interactive shell at install/update, where
# PATH is reliable, so `python3` resolves there. Scoped to posix: the
# `bin/` venv layout (and this plugin's testing) is macOS/Linux.
#
# The venv MUST live under `.aoe-build/` (the host's BUILD_OUTPUT_DIR),
# which the host excludes from the plugin tree_hash. A venv contains
# symlinks (e.g. bin/python3), and tree_hash hard-errors on symlinks. An
# earlier `.venv` in the source root passed the install-time featured-pin
# check (clean downloaded tree) but bricked at load: the load-time re-hash
# tripped over the symlink, so the manifest no longer verified as Featured
# and the reserved-namespace gate skipped the plugin.
[runtime]
kind = "command"
command = [".aoe-build/venv/bin/aoe-github-worker"]

[[runtime.build]]
command = ["python3", "-m", "venv", ".aoe-build/venv"]
platforms = ["linux", "macos"]

[[runtime.build]]
command = [".aoe-build/venv/bin/pip", "install", "."]
platforms = ["linux", "macos"]
