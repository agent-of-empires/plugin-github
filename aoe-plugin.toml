# Agent of Empires GitHub plugin.
#
# A valid, installable, discoverable plugin that wires up the common
# contribution kinds (commands, a setting, a UI slot, and a Tier 1 worker).
# The worker is real: it answers github.status / github.refresh / github.open
# with live GitHub API calls (see worker code under src/aoe_github_plugin/).
#
# Schema: aoe-plugin-api/src/manifest.rs in agent-of-empires (landed in #2093).
# The host parses this strictly (deny_unknown_fields), so every key below must
# match a field in that schema.

id = "agent-of-empires.github"
name = "GitHub"
version = "1.2.0"
# Manifest schema / host API version. Host supports 1..=4.
api_version = 4
# Host-app compatibility range (different axis from api_version, which is the
# manifest-schema version). The host refuses install/update outside this range
# and skips loading if a later aoe upgrade moves out of it. Requires api_version
# >= 4. Current released aoe is 1.11.3; refuse an untested 2.0.
aoe_version = ">=1.11.0, <2.0.0"
description = "GitHub integration for Agent of Empires: surface PR and issue state for your sessions."

# Capability grants are prompted at install and pinned to the manifest hash.
# Declare only what the worker actually uses so the prompt stays honest.
#   net           - real GitHub API calls (api.github.com); also shells out to
#                   `git` and `gh`.
#   runtime.worker - host RPCs the worker initiates: it pushes PR state to the
#                   rendered UI slots via `ui.state.set` (#2366) and reads its
#                   own `ui_refresh_secs` setting via `config.get` (#2399, gated
#                   on runtime.worker, not config.read). D9 is unmerged, so the
#                   exact gating capability for the ui.state.* RPCs is not
#                   published; runtime.worker is the closest mapping (events.*
#                   and config.get use it). Re-pin on rebase if D9 names a
#                   dedicated capability.
#   notifications - the worker raises in-app notices via the `ui.notify` host
#                   RPC: on a user-initiated refresh that is rate-limited it
#                   warns the user, with the reset countdown (#20).
# All are in aoe_plugin_api::KNOWN_CAPABILITIES. Add later as the surface grows:
#   session.read  to correlate PRs/issues with active sessions
capabilities = ["net", "runtime.worker", "session.read", "notifications"]

# Commands the plugin contributes (palette / CLI), namespaced by the host as
# plugin.agent-of-empires.github.<id>. The command-id -> worker RPC mapping
# (status -> github.status, etc.) is host convention (#2094), not declared here.
[[commands]]
id = "status"
title = "GitHub: status"
description = "Show the GitHub status summary for this checkout."

[[commands]]
id = "refresh"
title = "GitHub: refresh"
description = "Re-fetch the GitHub status for this checkout."

[[commands]]
id = "open"
title = "GitHub: open"
description = "Open this checkout's PR (or the create-PR page) in a browser."

# Settings, rendered generically on the TUI and web settings surfaces and
# stored under [plugins."agent-of-empires.github".settings]. The worker reads
# them back at runtime via the `config.get` host RPC (#2399).
[[settings]]
key = "ui_refresh_secs"
label = "GitHub UI refresh interval (seconds)"
description = "How often the worker checks GitHub for PR/CI/review changes (network tick). A cheap conditional check runs each tick; the costly query fires only on a change. 0 disables the background poll (it still pushes on startup and on refresh)."
type = "integer"
default = 120
min = 0
max = 86400
advanced = true

# UI extension points. The host renders each slot; the worker pushes display
# state through the `ui.state.set` host RPC (wired by #2366). Two per-session
# surfaces: a `row-badge` that shows one colored PR icon per repo with an open
# PR (click opens it), and a `pane` GitHub tool-window (in the right dock by
# default) listing each repo's PR / review / CI state. Both are driven by one
# push each per session (a list payload), so a multi-repo workspace needs no
# per-repo slot ids. Slot must be one of the host's known UiSlot variants.
[[ui]]
slot = "row-badge"
id = "github_pr_badge"

[[ui]]
slot = "pane"
id = "github_pane"

# Tier 1 worker: the executable the host spawns and supervises, speaking
# ndjson JSON-RPC over stdio. The host requires the entrypoint to be
# plugin-relative so the daemon's PATH never decides whether the worker
# launches (#2406): the build steps create a venv and install this package
# into it (defining the `aoe-github-worker` console script from
# pyproject.toml [project.scripts]), then `command` launches it.
# Build steps run in the user's interactive shell at install/update, where
# PATH is reliable, so `python3` resolves there. Scoped to posix: the
# `bin/` venv layout (and this plugin's testing) is macOS/Linux.
#
# The venv MUST live under `.aoe-build/` (the host's BUILD_OUTPUT_DIR),
# which the host excludes from the plugin tree_hash. A venv contains
# symlinks (e.g. bin/python3), and tree_hash hard-errors on symlinks. An
# earlier `.venv` in the source root passed the install-time featured-pin
# check (clean downloaded tree) but bricked at load: the load-time re-hash
# tripped over the symlink, so the manifest no longer verified as Featured
# and the reserved-namespace gate skipped the plugin.
[runtime]
kind = "command"
command = [".aoe-build/venv/bin/aoe-github-worker"]

[[runtime.build]]
command = ["python3", "-m", "venv", ".aoe-build/venv"]
platforms = ["linux", "macos"]

[[runtime.build]]
command = [".aoe-build/venv/bin/pip", "install", "."]
platforms = ["linux", "macos"]
