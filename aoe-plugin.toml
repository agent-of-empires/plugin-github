# Agent of Empires GitHub plugin.
#
# A valid, installable, discoverable plugin that wires up the common
# contribution kinds (commands, a setting, a UI slot, and a Tier 1 worker).
# The worker is real: it answers github.status / github.refresh / github.open
# with live GitHub API calls (see worker code under src/aoe_github_plugin/).
#
# Schema: aoe-plugin-api/src/manifest.rs in agent-of-empires (landed in #2093).
# The host parses this strictly (deny_unknown_fields), so every key below must
# match a field in that schema.

id = "agent-of-empires.github"
name = "GitHub"
version = "0.1.0"
# Manifest schema / host API version. Host supports 1..=1.
api_version = 1
description = "GitHub integration for Agent of Empires: surface PR and issue state for your sessions."

# Capability grants are prompted at install and pinned to the manifest hash.
# Declare only what the worker actually uses so the prompt stays honest.
#   net           - real GitHub API calls (api.github.com); also shells out to
#                   `git` and `gh`.
#   runtime.worker - host RPCs the worker initiates. The worker pushes PR state
#                   to the rendered UI slots via `ui.state.set` (#2366). D9 is
#                   unmerged, so the exact gating capability for the ui.state.*
#                   RPCs is not published; runtime.worker is the closest mapping
#                   (the events.* host RPCs use it). Re-pin on rebase if D9
#                   names a dedicated capability.
# Both are in aoe_plugin_api::KNOWN_CAPABILITIES. Add later as the surface grows:
#   session.read  to correlate PRs/issues with active sessions
capabilities = ["net", "runtime.worker"]

# Commands the plugin contributes (palette / CLI), namespaced by the host as
# plugin.agent-of-empires.github.<id>. The command-id -> worker RPC mapping
# (status -> github.status, etc.) is host convention (#2094), not declared here.
[[commands]]
id = "status"
title = "GitHub: status"
description = "Show the GitHub status summary for this checkout."

[[commands]]
id = "refresh"
title = "GitHub: refresh"
description = "Re-fetch the GitHub status for this checkout."

[[commands]]
id = "open"
title = "GitHub: open"
description = "Open this checkout's PR (or the create-PR page) in a browser."

# A setting, rendered generically on the TUI and web settings surfaces and
# stored under [plugins."agent-of-empires.github".settings]. Only key/label/
# description here; the typed widget schema (toggle, default value) arrives
# with the settings registry (#2094).
[[settings]]
key = "show_in_status_bar"
label = "Show GitHub status in the status bar"
description = "Publish a short GitHub summary to the status bar segment this plugin contributes."

# UI extension points. The host renders each slot; the worker pushes display
# state through the `ui.state.set` host RPC (wired by #2366). The status-bar
# segment shows a one-line summary; the session-row badge shows per-session PR
# state. Slot strings are free-form (UiContribution validates non-empty only);
# they match the kebab slot names in #2366's D9 design.
[[ui]]
slot = "status-bar-segment"
id = "github_status"

[[ui]]
slot = "session-row-badge"
id = "github_pr_badge"

# Tier 1 worker: the executable the host spawns and supervises, speaking
# ndjson JSON-RPC over stdio. `aoe-github-worker` is the console script defined
# in pyproject.toml ([project.scripts]); equivalently
# `python -m aoe_github_plugin.main`. The exact host spawn contract (interpreter
# resolution, working dir, args) is finalized with the Tier 1 host (#2095).
[runtime]
kind = "command"
command = ["aoe-github-worker"]
